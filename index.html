<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>약속잡기</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7C3AED; --purple-h: #6D28D9; --purple-light: #EDE9FE;
      --g100: #D1FAE5; --g200: #A7F3D0;
      --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827;
      --amber-100: #FEF3C7; --amber-600: #D97706;
      --r: 12px;
      --sh: 0 4px 6px -1px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.1);
      --sh-lg: 0 10px 15px -3px rgb(0 0 0/.1),0 4px 6px -4px rgb(0 0 0/.1);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #F3F4F6; min-height: 100vh; color: var(--gray-900); }
    .screen { display: none; }

    /* ── Home ── */
    #sHome.on { display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 40px 20px 60px; background: #F3F4F6; }
    .home-card { background: #fff; border-radius: 24px; padding: 40px 36px; width: 100%; max-width: 460px; box-shadow: var(--sh-lg); }
    .home-hero { text-align: center; margin-bottom: 28px; }
    .home-hero .ei { font-size: 56px; display: block; margin-bottom: 12px; }
    .home-hero h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .home-hero p { color: var(--gray-500); font-size: 14px; }

    /* ── Auth header ── */
    .auth-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--gray-50); border-radius: 10px; margin-bottom: 20px; }
    .auth-bar-info { font-size: 13px; color: var(--gray-700); font-weight: 600; }
    .auth-bar-info span { color: var(--gray-400); font-weight: 400; }
    .btn-auth { padding: 7px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s; }
    .btn-login { background: var(--purple); color: #fff; }
    .btn-login:hover { background: var(--purple-h); }
    .btn-logout { background: var(--gray-200); color: var(--gray-700); }
    .btn-logout:hover { background: var(--gray-300, #D1D5DB); }

    /* ── Auth Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-card { background: #fff; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 380px; box-shadow: var(--sh-lg); }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--gray-500); margin-bottom: 22px; }
    .modal-tabs { display: flex; border-radius: 10px; border: 2px solid var(--gray-200); overflow: hidden; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; color: var(--gray-500); transition: background .2s, color .2s; }
    .tab-btn.active { background: var(--purple); color: #fff; }
    .auth-error { padding: 10px 12px; background: #FEE2E2; color: #B91C1C; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .auth-success { padding: 10px 12px; background: #D1FAE5; color: #065F46; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-400); margin-top: -4px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; border: 2px solid var(--gray-200); border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; }
    .field input:focus { border-color: var(--purple); }

    .btn-main { display: block; width: 100%; padding: 14px; background: var(--purple); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s, transform .1s; }
    .btn-main:hover { background: var(--purple-h); }
    .btn-main:active { transform: scale(.98); }
    .btn-main:disabled { opacity: .6; cursor: not-allowed; }
    .btn-cancel { padding: 14px 16px; background: var(--gray-100); color: var(--gray-700); border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .2s; flex-shrink: 0; }
    .btn-cancel:hover { background: var(--gray-200); }
    .create-row { display: flex; gap: 8px; }

    .mode-toggle { display: flex; border-radius: 10px; border: 2px solid var(--gray-200); overflow: hidden; margin-top: 2px; }
    .mode-btn { flex: 1; padding: 11px 8px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; color: var(--gray-500); transition: background .2s, color .2s; line-height: 1.3; }
    .mode-btn.active { background: var(--purple); color: #fff; }

    .ml-section { margin-top: 24px; }
    .ml-header { font-size: 12px; font-weight: 700; color: var(--gray-400); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 10px; }
    .ml-empty { text-align: center; padding: 20px 10px; color: var(--gray-400); font-size: 14px; line-height: 1.7; }
    .ml-item { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 12px; background: var(--gray-50); border: 2px solid var(--gray-200); cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: 8px; }
    .ml-item:hover { border-color: var(--purple); background: var(--purple-light); }
    .ml-info { flex: 1; min-width: 0; }
    .ml-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ml-meta { font-size: 12px; color: var(--gray-500); display: flex; gap: 5px; align-items: center; }
    .ml-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: var(--purple-light); color: var(--purple); }
    .ml-del { background: none; border: none; cursor: pointer; padding: 5px 7px; font-size: 15px; color: var(--gray-400); border-radius: 6px; transition: color .15s, background .15s; flex-shrink: 0; }
    .ml-del:hover { color: #EF4444; background: #FEE2E2; }
    .login-prompt { text-align: center; padding: 24px 10px; color: var(--gray-400); font-size: 14px; line-height: 1.8; }

    /* ── Meeting ── */
    #sMeeting.on { display: block; min-height: 100vh; }
    .top-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .top-title { color: var(--gray-900); font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .top-bar-right { display: flex; gap: 8px; align-items: center; }
    .btn-share { background: var(--purple); color: #fff; border: none; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity .2s; }
    .btn-share:hover { opacity: .85; }
    .btn-back { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .2s; display: none; }
    .btn-back:hover { background: var(--gray-200); }
    .btn-edit-title { background: none; border: none; cursor: pointer; font-size: 13px; padding: 3px 5px; border-radius: 5px; opacity: .5; transition: opacity .15s; line-height: 1; }
    .btn-edit-title:hover { opacity: 1; }
    #titleInput { font-size: 17px; font-weight: 800; border: none; border-bottom: 2px solid var(--purple); outline: none; background: transparent; color: var(--gray-900); font-family: inherit; min-width: 160px; max-width: 300px; }
    .btn-add-mine { background: #F0FDF4; color: #15803D; border: 1px solid #86EFAC; border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .2s; }
    .btn-add-mine:hover { background: #DCFCE7; }

    .layout { max-width: 1200px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 250px 1fr 290px; gap: 18px; align-items: start; }
    @media(max-width:960px) { .layout { grid-template-columns: 1fr; } }

    .card { background: #fff; border-radius: var(--r); padding: 20px; box-shadow: var(--sh); }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

    .p-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .p-row input { flex: 1; padding: 9px 12px; border: 2px solid var(--gray-200); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
    .p-row input:focus { border-color: var(--purple); }
    .btn-add { padding: 9px 14px; background: var(--purple); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .btn-add:hover { background: var(--purple-h); }

    .p-list { display: flex; flex-direction: column; gap: 7px; }
    .p-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; border: 2px solid transparent; }
    .p-item.active { background: var(--purple-light); border-color: var(--purple); }
    .p-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .p-name { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .p-cnt { font-size: 12px; padding: 2px 7px; border-radius: 9px; background: var(--gray-100); color: var(--gray-500); }
    .active .p-cnt { background: #fff; color: var(--purple); font-weight: 700; }
    .p-del-btn { background: none; border: none; cursor: pointer; padding: 3px 5px; font-size: 14px; color: var(--gray-400); border-radius: 5px; transition: color .15s, background .15s; flex-shrink: 0; line-height: 1; }
    .p-del-btn:hover { color: #EF4444; background: #FEE2E2; }

    .tip { padding: 12px; background: var(--amber-100); border-radius: 9px; font-size: 13px; color: var(--amber-600); line-height: 1.55; margin-top: 12px; }
    .empty-msg { text-align: center; padding: 20px 10px; color: var(--gray-400); font-size: 13px; line-height: 1.7; }
    .empty-msg .ei { font-size: 36px; display: block; margin-bottom: 10px; }

    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-nav button { background: none; border: 1px solid var(--gray-200); border-radius: 7px; width: 32px; height: 32px; font-size: 17px; cursor: pointer; color: var(--gray-700); display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .cal-nav button:hover { background: var(--gray-100); }
    .cal-month { font-size: 17px; font-weight: 700; }
    .wdays { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .wd { text-align: center; font-size: 11px; font-weight: 600; color: var(--gray-400); padding: 3px; }
    .wd:first-child { color: #EF4444; }
    .wd:last-child { color: #3B82F6; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .day { border-radius: 10px; display: flex; flex-direction: column; align-items: stretch; padding: 4px 3px 3px; gap: 2px; background: var(--gray-50); }
    .day.blank { background: transparent; }
    .dn { font-size: 13px; font-weight: 700; text-align: center; line-height: 1; padding: 1px 0; margin-bottom: 1px; }
    .day.sun .dn { color: #EF4444; }
    .day.sat .dn { color: #3B82F6; }
    .day.today .dn { background: var(--purple); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; margin: 0 auto 2px; }
    .slot { border-radius: 5px; padding: 2px 4px; display: flex; align-items: center; gap: 3px; cursor: pointer; transition: filter .12s, transform .1s; background: var(--gray-100); min-height: 18px; }
    .slot:hover { filter: brightness(.9); transform: scale(1.04); position: relative; z-index: 1; }
    .slot.mine-slot { box-shadow: inset 0 0 0 2px var(--purple); }
    .slot-lbl { font-size: 9px; font-weight: 700; color: var(--gray-500); flex-shrink: 0; width: 16px; line-height: 1; }
    .slot.mine-slot .slot-lbl { color: var(--purple); }
    .slot-dots { display: flex; gap: 2px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
    .sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .slot.s1 { background: var(--g100); }
    .slot.s2 { background: var(--g200); }
    .slot.s3 { background: linear-gradient(135deg,#FDE68A 0%,#FBBF24 100%); border: 1px solid #D97706; box-shadow: 0 1px 5px rgba(217,119,6,.3); }
    .slot.s3.mine-slot { box-shadow: 0 1px 5px rgba(217,119,6,.3), inset 0 0 0 2px var(--purple); }
    .slot.s3 .slot-lbl { color: #92400E; }
    .slot.s3.mine-slot .slot-lbl { color: var(--purple); }
    .legend { margin-top: 12px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--gray-500); }
    .leg { display: flex; align-items: center; gap: 4px; }
    .leg-box { width: 13px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    #bestList { max-height: calc(100vh - 180px); overflow-y: auto; padding-right: 2px; }
    @media(max-width:960px) { #bestList { max-height: 320px; } }
    .best-list { display: flex; flex-direction: column; gap: 10px; }
    .best-card { padding: 12px 14px; border-radius: 10px; border-left: 4px solid var(--gray-300); background: var(--gray-50); transition: transform .12s; }
    .best-card:hover { transform: translateX(3px); }
    .best-card.gold { border-left-color: #D97706; background: #FFFBEB; }
    .best-date-lbl { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .best-slot-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
    .best-slot-row:last-child { margin-bottom: 0; }
    .bsr-lbl { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: var(--gray-200); color: var(--gray-700); flex-shrink: 0; }
    .bsr-lbl.gold { background: linear-gradient(135deg,#FDE68A,#FBBF24); color: #92400E; border: 1px solid #D97706; }
    .bsr-cnt { font-size: 11px; color: var(--gray-500); flex-shrink: 0; }
    .bsr-who { display: flex; flex-wrap: wrap; gap: 4px; }
    .who-chip { display: flex; align-items: center; gap: 3px; font-size: 11px; background: #fff; padding: 2px 7px; border-radius: 9px; color: var(--gray-700); }
    .who-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--gray-900); color: #fff; padding: 11px 22px; border-radius: 100px; font-size: 14px; font-weight: 600; z-index: 100; pointer-events: none; transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Auth Modal -->
<div id="authModal" style="display:none">
  <div class="modal-backdrop" onclick="if(event.target===this)closeAuthModal()">
    <div class="modal-card">
      <button class="modal-close" onclick="closeAuthModal()">✕</button>
      <div class="modal-title">약속잡기</div>
      <div class="modal-sub">계정으로 어디서든 내 약속을 관리하세요</div>
      <div class="modal-tabs">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">로그인</button>
        <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">회원가입</button>
      </div>
      <div id="authMsg" style="display:none"></div>
      <div class="field">
        <label>이메일</label>
        <input id="authEmail" type="email" placeholder="이메일 입력" autocomplete="email">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input id="authPw" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')submitAuth()">
      </div>
      <button class="btn-main" id="authSubmitBtn" onclick="submitAuth()">로그인</button>
    </div>
  </div>
</div>

<!-- Home -->
<div id="sHome" class="screen on">
  <div class="home-card">
    <div class="home-hero">
      <span class="ei">📅</span>
      <h1>약속잡기</h1>
      <p>약속을 만들고 링크를 공유하세요</p>
    </div>

    <div class="auth-bar">
      <div class="auth-bar-info" id="authBarInfo"><span>로그인하면 어디서든 내 약속을 볼 수 있어요</span></div>
      <button class="btn-auth btn-login" id="authBarBtn" onclick="openAuthModal()">로그인</button>
    </div>

    <div id="createForm" style="display:none">
      <div class="field">
        <label>약속 이름</label>
        <input id="mtitle" type="text" placeholder="예: 대학 동기 6월 모임" maxlength="50" autocomplete="off">
      </div>
      <div class="field">
        <label>조사 방식</label>
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeDate" onclick="setMode('date')">📆 날짜만</button>
          <button class="mode-btn" id="modeSlot" onclick="setMode('slot')">🍽️ 점심 / 저녁</button>
        </div>
      </div>
      <div class="create-row">
        <button class="btn-main" id="createBtn" style="flex:1">만들기 →</button>
        <button class="btn-cancel" onclick="toggleCreateForm(false)">취소</button>
      </div>
    </div>

    <button class="btn-main" id="newMeetingBtn" onclick="onNewMeetingClick()">+ 새 약속 만들기</button>

    <div class="ml-section">
      <div class="ml-header">내가 만든 약속</div>
      <div id="meetingList"></div>
    </div>
  </div>
</div>

<!-- Meeting -->
<div id="sMeeting" class="screen">
  <div class="top-bar">
    <div class="top-title">
      <button class="btn-back" id="backBtn">← 목록</button>
      <span>📅</span>
      <span id="topTitle">로딩 중...</span>
      <button class="btn-edit-title" id="editTitleBtn" onclick="startEditTitle()" title="모임 이름 수정">✏️</button>
      <input id="titleInput" style="display:none" maxlength="50" autocomplete="off"
        onblur="saveTitle()" onkeydown="if(event.key==='Enter')this.blur();else if(event.key==='Escape')cancelEditTitle()">
    </div>
    <div class="top-bar-right">
      <button class="btn-add-mine" id="addMineBtn" onclick="addToMyMeetings()" style="display:none">📌 내 일정에 추가</button>
      <button class="btn-share" id="shareBtn">🔗 링크 복사</button>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="card-title">👥 참여자</div>
      <div id="joinSection">
        <div class="p-row">
          <input id="joinName" type="text" placeholder="참여자 이름" maxlength="20" autocomplete="off">
          <button class="btn-add" id="joinBtn">추가</button>
        </div>
        <div class="tip" style="margin-top:0">👆 이름 추가 후 목록에서 클릭해 선택 → 달력에서 일정 입력</div>
      </div>
      <div id="plist" class="p-list"></div>
      <div id="ptip" class="tip" style="display:none">✏️ 달력에서 클릭해 내 일정을 선택/해제하세요</div>
    </div>

    <div class="card">
      <div class="cal-nav">
        <button id="prevM">‹</button>
        <div class="cal-month" id="calTitle"></div>
        <button id="nextM">›</button>
      </div>
      <div class="wdays">
        <div class="wd">일</div><div class="wd">월</div><div class="wd">화</div>
        <div class="wd">수</div><div class="wd">목</div><div class="wd">금</div><div class="wd">토</div>
      </div>
      <div id="calGrid" class="cal-grid"></div>
      <div class="legend">
        <div class="leg"><div class="leg-box" style="background:linear-gradient(135deg,#FDE68A,#FBBF24);border:1px solid #D97706"></div>전원 가능</div>
        <div class="leg"><div class="leg-box" style="background:var(--g200)"></div>많이 가능</div>
        <div class="leg"><div class="leg-box" style="background:var(--g100)"></div>일부 가능</div>
        <div class="leg"><div class="leg-box" style="background:var(--gray-100)"></div>미선택</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⭐ 추천 날짜</div>
      <div id="bestList"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Supabase ──
const SUPA_URL = 'https://dhwlvszqenjgddwtkqjb.supabase.co';
const SUPA_KEY = 'sb_publishable_MwWWiXPTrY8CTqNSUWSDmg_2aBelhit';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── State ──
let liveData    = { title: '', mode: 'date', participants: {} };
let meetingId   = null;
let selectedPid = null;
let vy = new Date().getFullYear();
let vm = new Date().getMonth();
let selectedMode = 'date';
let currentUser = null;
let authTab     = 'login';

const COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#C39BD3','#A29BFE','#FDCB6E','#00B894','#E17055','#74B9FF'];
const DAYS   = ['일','월','화','수','목','금','토'];

// ── Auth ──
function openAuthModal() {
  switchTab('login');
  document.getElementById('authEmail').value = '';
  document.getElementById('authPw').value = '';
  document.getElementById('authMsg').style.display = 'none';
  document.getElementById('authModal').style.display = 'block';
  setTimeout(() => document.getElementById('authEmail').focus(), 50);
}
function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

function switchTab(tab) {
  authTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('authSubmitBtn').textContent = tab === 'login' ? '로그인' : '회원가입';
  document.getElementById('authMsg').style.display = 'none';
}

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pw    = document.getElementById('authPw').value;
  const btn   = document.getElementById('authSubmitBtn');
  const msg   = document.getElementById('authMsg');
  if (!email || !pw) { showAuthMsg('이메일과 비밀번호를 입력해주세요', false); return; }

  btn.disabled = true;
  btn.textContent = authTab === 'login' ? '로그인 중...' : '가입 중...';

  const { data, error } = authTab === 'login'
    ? await sb.auth.signInWithPassword({ email, password: pw })
    : await sb.auth.signUp({ email, password: pw });

  btn.disabled = false;
  btn.textContent = authTab === 'login' ? '로그인' : '회원가입';

  if (error) { showAuthMsg(translateError(error.message), false); return; }
  closeAuthModal();
}

function translateError(msg) {
  if (msg.includes('Invalid login')) return '이메일 또는 비밀번호가 틀렸습니다';
  if (msg.includes('already registered')) return '이미 가입된 이메일입니다';
  if (msg.includes('at least 6')) return '비밀번호는 6자 이상이어야 합니다';
  if (msg.includes('valid email')) return '올바른 이메일 형식이 아닙니다';
  return msg;
}

function showAuthMsg(text, isOk) {
  const el = document.getElementById('authMsg');
  el.className = isOk ? 'auth-success' : 'auth-error';
  el.textContent = text;
  el.style.display = 'block';
}

function updateAuthBar(user) {
  const info = document.getElementById('authBarInfo');
  const btn  = document.getElementById('authBarBtn');
  if (user) {
    info.innerHTML = `<b>${esc(user.email)}</b>`;
    btn.textContent = '로그아웃';
    btn.className = 'btn-auth btn-logout';
    btn.onclick = () => sb.auth.signOut();
  } else {
    info.innerHTML = '<span>로그인하면 어디서든 내 약속을 볼 수 있어요</span>';
    btn.textContent = '로그인';
    btn.className = 'btn-auth btn-login';
    btn.onclick = openAuthModal;
  }
}

// ── Meeting list (Supabase + localStorage fallback) ──
function genId() { return Math.random().toString(36).slice(2, 10); }

function getLocalMeetings() {
  try { return JSON.parse(localStorage.getItem('yaksok_admin_v2')) || []; } catch(_) { return []; }
}
function setLocalMeetings(list) { localStorage.setItem('yaksok_admin_v2', JSON.stringify(list)); }

async function getMyMeetings() {
  if (currentUser) {
    const { data } = await sb.from('user_meetings').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
    return (data || []).map(r => ({ id: r.meeting_id, title: r.title, mode: r.mode, createdAt: new Date(r.created_at).getTime() }));
  }
  return getLocalMeetings();
}

async function addMyMeeting(m) {
  if (currentUser) {
    await sb.from('user_meetings').upsert({ user_id: currentUser.id, meeting_id: m.id, title: m.title, mode: m.mode });
  }
  const list = getLocalMeetings().filter(x => x.id !== m.id);
  list.unshift(m);
  setLocalMeetings(list);
}

async function removeMyMeeting(id) {
  if (currentUser) {
    await sb.from('user_meetings').delete().eq('user_id', currentUser.id).eq('meeting_id', id);
  }
  setLocalMeetings(getLocalMeetings().filter(x => x.id !== id));
}

async function isMine(id) {
  if (currentUser) {
    const { data } = await sb.from('user_meetings').select('meeting_id').eq('user_id', currentUser.id).eq('meeting_id', id).maybeSingle();
    return !!data;
  }
  return getLocalMeetings().some(x => x.id === id);
}

// ── Meeting data (Supabase) ──
async function saveMeetingData(id, data) {
  localStorage.setItem('yaksok_data_' + id, JSON.stringify(data));
  sb.from('meetings').upsert({ id, data }).then(() => {}).catch(() => {});
}

function localMeetingData(id) {
  try { return JSON.parse(localStorage.getItem('yaksok_data_' + id)) || null; } catch(_) { return null; }
}

// ── Screen ──
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }

function goHome() {
  meetingId = null; selectedPid = null;
  liveData = { title: '', mode: 'date', participants: {} };
  history.replaceState(null, '', location.pathname);
  toggleCreateForm(false);
  showScreen('sHome');
  renderMeetingList();
}

async function goMeeting(id) {
  meetingId   = id;
  selectedPid = null;
  const cached = localMeetingData(id);
  liveData = cached || { title: '', mode: 'date', participants: {} };
  history.replaceState(null, '', '#m/' + id);
  showScreen('sMeeting');
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('topTitle').textContent  = liveData.title;
  updateAddMineBtn();
  render();
  try {
    const { data } = await sb.from('meetings').select('data').eq('id', id).single();
    if (data && meetingId === id) {
      liveData = data.data;
      localStorage.setItem('yaksok_data_' + id, JSON.stringify(liveData));
      document.getElementById('topTitle').textContent = liveData.title;
      updateAddMineBtn();
      render();
    }
  } catch(e) {}
}

// ── 약속 생성 ──
async function createMeeting() {
  const t = document.getElementById('mtitle').value.trim();
  if (!t) { document.getElementById('mtitle').focus(); return; }
  const btn = document.getElementById('createBtn');
  btn.textContent = '만드는 중...'; btn.disabled = true;

  const id   = genId();
  const data = { title: t, mode: selectedMode, createdAt: Date.now(), participants: {} };

  const { error } = await sb.from('meetings').insert({ id, data });
  btn.textContent = '만들기 →'; btn.disabled = false;
  if (error) { toast('오류: 잠시 후 다시 시도하세요'); return; }

  await addMyMeeting({ id, title: t, mode: selectedMode, createdAt: Date.now() });
  localStorage.setItem('yaksok_data_' + id, JSON.stringify(data));
  toggleCreateForm(false);
  document.getElementById('mtitle').value = '';
  meetingId = id; selectedPid = null; liveData = data;
  history.replaceState(null, '', '#m/' + id);
  showScreen('sMeeting');
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('topTitle').textContent  = t;
  updateAddMineBtn();
  render();
  toast('약속 생성 완료!');
}

// ── 내 일정에 추가 ──
async function updateAddMineBtn() {
  const mine = await isMine(meetingId);
  document.getElementById('addMineBtn').style.display = mine ? 'none' : '';
  document.getElementById('shareBtn').style.display   = mine ? '' : 'none';
}

async function addToMyMeetings() {
  if (!meetingId) return;
  if (!currentUser) { openAuthModal(); toast('로그인 후 내 목록에 추가할 수 있어요'); return; }
  await addMyMeeting({ id: meetingId, title: liveData.title, mode: liveData.mode || 'date', createdAt: liveData.createdAt || Date.now() });
  updateAddMineBtn();
  toast('내 일정 목록에 추가되었습니다!');
}

function onNewMeetingClick() {
  if (!currentUser) { openAuthModal(); toast('로그인 후 약속을 만들 수 있어요'); return; }
  toggleCreateForm(true);
}

// ── 모임 이름 수정 ──
function startEditTitle() {
  const input = document.getElementById('titleInput');
  input.value = liveData.title;
  document.getElementById('topTitle').style.display = 'none';
  document.getElementById('editTitleBtn').style.display = 'none';
  input.style.display = 'inline-block';
  input.focus(); input.select();
}
async function saveTitle() {
  const input = document.getElementById('titleInput');
  const t = input.value.trim();
  if (t && t !== liveData.title) {
    liveData.title = t;
    saveMeetingData(meetingId, liveData);
    if (currentUser) {
      await sb.from('user_meetings').update({ title: t }).eq('user_id', currentUser.id).eq('meeting_id', meetingId);
    }
    const list = getLocalMeetings();
    const m = list.find(x => x.id === meetingId);
    if (m) { m.title = t; setLocalMeetings(list); }
  }
  document.getElementById('topTitle').textContent = liveData.title;
  document.getElementById('topTitle').style.display = '';
  document.getElementById('editTitleBtn').style.display = '';
  input.style.display = 'none';
}
function cancelEditTitle() {
  document.getElementById('topTitle').style.display = '';
  document.getElementById('editTitleBtn').style.display = '';
  document.getElementById('titleInput').style.display = 'none';
}

// ── 참여자 추가 ──
function addParticipant() {
  const name = document.getElementById('joinName').value.trim();
  if (!name) { document.getElementById('joinName').focus(); return; }
  const existing = Object.entries(liveData.participants).find(([, p]) => p.name === name);
  if (existing) { selectedPid = existing[0]; document.getElementById('joinName').value = ''; render(); return; }
  const used  = Object.values(liveData.participants).map(p => p.color);
  const color = COLORS.find(c => !used.includes(c)) || COLORS[Object.keys(liveData.participants).length % COLORS.length];
  const pid   = genId();
  liveData.participants[pid] = { name, color, slots: {} };
  selectedPid = pid;
  document.getElementById('joinName').value = '';
  saveMeetingData(meetingId, liveData);
  render();
  toast(`${name} 추가됨 — 달력에서 일정을 선택하세요`);
}

function selectParticipant(pid) { selectedPid = selectedPid === pid ? null : pid; render(); }

// ── 일정 토글 ──
function toggleSlot(ds, period) {
  if (!selectedPid) { toast('왼쪽 목록에서 참여자를 선택하세요'); return; }
  const me = liveData.participants[selectedPid];
  if (!me) return;
  const cur  = me.slots[ds] || { am: false, pm: false };
  const next = { ...cur, [period]: !cur[period] };
  if (next.am || next.pm) me.slots[ds] = next; else delete me.slots[ds];
  saveMeetingData(meetingId, liveData);
  render();
}
function toggleDate(ds) {
  if (!selectedPid) { toast('왼쪽 목록에서 참여자를 선택하세요'); return; }
  const me = liveData.participants[selectedPid];
  if (!me) return;
  const has = me.slots[ds] && (me.slots[ds].am || me.slots[ds].pm);
  if (!has) me.slots[ds] = { am: true, pm: true }; else delete me.slots[ds];
  saveMeetingData(meetingId, liveData);
  render();
}

// ── 참여자 삭제 ──
function deleteParticipant(pid) {
  const p = liveData.participants[pid];
  if (!p || !confirm(`"${p.name}"을(를) 삭제할까요?`)) return;
  delete liveData.participants[pid];
  if (selectedPid === pid) selectedPid = null;
  saveMeetingData(meetingId, liveData);
  render();
}

// ── 약속 삭제 ──
async function deleteMeeting(id, e) {
  e.stopPropagation();
  const m = getLocalMeetings().find(x => x.id === id);
  if (!m || !confirm(`"${m.title}" 약속을 삭제할까요?`)) return;
  await removeMyMeeting(id);
  localStorage.removeItem('yaksok_data_' + id);
  renderMeetingList();
}

// ── Render ──
async function renderMeetingList() {
  const el = document.getElementById('meetingList');
  if (!currentUser && getLocalMeetings().length === 0) {
    el.innerHTML = '<div class="login-prompt">로그인하면 어디서든 내 약속 목록을<br>확인할 수 있어요 👆</div>';
    return;
  }
  el.innerHTML = '<div class="ml-empty" style="font-size:12px;color:var(--gray-400)">불러오는 중...</div>';
  const meetings = await getMyMeetings();
  if (!meetings.length) { el.innerHTML = '<div class="ml-empty">아직 만든 약속이 없어요<br>첫 약속을 만들어보세요!</div>'; return; }
  el.innerHTML = meetings.map(m => {
    const badge = m.mode === 'date' ? '날짜만' : '점심+저녁';
    const dt    = new Date(m.createdAt);
    return `<div class="ml-item" onclick="goMeeting('${m.id}')">
      <div class="ml-info">
        <div class="ml-title">${esc(m.title)}</div>
        <div class="ml-meta"><span class="ml-badge">${badge}</span><span>${dt.getMonth()+1}/${dt.getDate()} 생성</span></div>
      </div>
      <button class="ml-del" onclick="deleteMeeting('${m.id}',event)" title="삭제">✕</button>
    </div>`;
  }).join('');
}

function render() {
  const sel = selectedPid && liveData.participants[selectedPid];
  const ptip = document.getElementById('ptip');
  ptip.style.display = sel ? 'block' : 'none';
  if (sel) ptip.textContent = `✏️ ${sel.name}의 일정 편집 중`;
  renderP(); renderCal(); renderBest();
}

function renderP() {
  const parts = Object.entries(liveData.participants);
  const el    = document.getElementById('plist');
  if (!parts.length) { el.innerHTML = '<div class="empty-msg"><span class="ei">👋</span>아직 참여자가 없어요</div>'; return; }
  el.innerHTML = parts.map(([pid, p]) => {
    const isSel = pid === selectedPid;
    const slots = Object.keys(p.slots || {}).length;
    return `<div class="p-item${isSel?' active':''}" onclick="selectParticipant('${pid}')" style="cursor:pointer">
      <div class="p-dot" style="background:${p.color}"></div>
      <div class="p-name">${esc(p.name)}</div>
      <div class="p-cnt">${slots}일</div>
      <button class="p-del-btn" onclick="event.stopPropagation();deleteParticipant('${pid}')">✕</button>
    </div>`;
  }).join('');
}

function renderCal() {
  document.getElementById('calTitle').textContent = `${vy}년 ${vm+1}월`;
  const first    = new Date(vy, vm, 1).getDay();
  const last     = new Date(vy, vm+1, 0).getDate();
  const todayStr = fmt(new Date());
  const parts    = Object.entries(liveData.participants);
  const total    = parts.length;
  const me       = selectedPid ? liveData.participants[selectedPid] : null;
  let html = '';
  for (let i = 0; i < first; i++) html += '<div class="day blank"></div>';
  for (let d = 1; d <= last; d++) {
    const ds  = `${vy}-${pad(vm+1)}-${pad(d)}`;
    const dow = (first + d - 1) % 7;
    const dayCls = ['day', dow===0?'sun':dow===6?'sat':'', ds===todayStr?'today':''].filter(Boolean).join(' ');
    if (liveData.mode === 'date') {
      const avail  = parts.filter(([, p]) => p.slots?.[ds]?.am || p.slots?.[ds]?.pm);
      const isMine = !!(me?.slots?.[ds]?.am || me?.slots?.[ds]?.pm);
      const cls    = ['slot', heatClass(avail.length, total), isMine?'mine-slot':''].filter(Boolean).join(' ');
      html += `<div class="${dayCls}"><div class="dn">${d}</div>
        <div class="${cls}" onclick="toggleDate('${ds}')">
          <div class="slot-dots">${avail.map(([,p])=>`<div class="sdot" style="background:${p.color}"></div>`).join('')}</div>
        </div></div>`;
    } else {
      const amA  = parts.filter(([, p]) => p.slots?.[ds]?.am);
      const pmA  = parts.filter(([, p]) => p.slots?.[ds]?.pm);
      const amCl = ['slot', heatClass(amA.length, total), me?.slots?.[ds]?.am?'mine-slot':''].filter(Boolean).join(' ');
      const pmCl = ['slot', heatClass(pmA.length, total), me?.slots?.[ds]?.pm?'mine-slot':''].filter(Boolean).join(' ');
      html += `<div class="${dayCls}"><div class="dn">${d}</div>
        <div class="${amCl}" onclick="toggleSlot('${ds}','am')"><span class="slot-lbl">점심</span><div class="slot-dots">${amA.map(([,p])=>`<div class="sdot" style="background:${p.color}"></div>`).join('')}</div></div>
        <div class="${pmCl}" onclick="toggleSlot('${ds}','pm')"><span class="slot-lbl">저녁</span><div class="slot-dots">${pmA.map(([,p])=>`<div class="sdot" style="background:${p.color}"></div>`).join('')}</div></div>
      </div>`;
    }
  }
  document.getElementById('calGrid').innerHTML = html;
}

function renderBest() {
  const el    = document.getElementById('bestList');
  const parts = Object.entries(liveData.participants);
  if (!parts.length) { el.innerHTML = '<div class="empty-msg"><span class="ei">📊</span>참여자를 추가해주세요</div>'; return; }
  const map = new Map();
  parts.forEach(([, p]) => {
    Object.entries(p.slots || {}).forEach(([ds, s]) => {
      if (!s.am && !s.pm) return;
      if (!map.has(ds)) map.set(ds, { am:[], pm:[] });
      if (s.am) map.get(ds).am.push(p);
      if (s.pm) map.get(ds).pm.push(p);
    });
  });
  if (!map.size) { el.innerHTML = '<div class="empty-msg"><span class="ei">📅</span>달력에서 일정을 선택해주세요</div>'; return; }
  const total  = parts.length;
  const sorted = [...map.entries()].sort((a,b) => {
    const sa = Math.max(a[1].am.length, a[1].pm.length);
    const sb2 = Math.max(b[1].am.length, b[1].pm.length);
    return sb2 !== sa ? sb2 - sa : a[0].localeCompare(b[0]);
  }).slice(0, 8);
  const slotRow = (label, ps, isAll) => !ps.length ? '' :
    `<div class="best-slot-row"><span class="bsr-lbl${isAll?' gold':''}">${label}${isAll?' ⭐':''}</span>
    <span class="bsr-cnt">${ps.length}/${total}명</span>
    <div class="bsr-who">${ps.map(p=>`<div class="who-chip"><div class="who-dot" style="background:${p.color}"></div>${esc(p.name)}</div>`).join('')}</div></div>`;
  if (liveData.mode === 'date') {
    el.innerHTML = '<div class="best-list">' + sorted.map(([ds,{am}]) => {
      const dt = new Date(ds+'T00:00:00'), isGold = am.length===total;
      return `<div class="best-card${isGold?' gold':''}"><div class="best-date-lbl">${dt.getMonth()+1}월 ${dt.getDate()}일 (${DAYS[dt.getDay()]})</div>${slotRow(isGold?'전원 가능':'가능',am,isGold)}</div>`;
    }).join('') + '</div>';
  } else {
    el.innerHTML = '<div class="best-list">' + sorted.map(([ds,{am,pm}]) => {
      const dt=new Date(ds+'T00:00:00'), allAM=am.length===total, allPM=pm.length===total, isGold=allAM||allPM;
      const rows = pm.length>am.length ? slotRow('저녁',pm,allPM)+slotRow('점심',am,allAM) : slotRow('점심',am,allAM)+slotRow('저녁',pm,allPM);
      return `<div class="best-card${isGold?' gold':''}"><div class="best-date-lbl">${dt.getMonth()+1}월 ${dt.getDate()}일 (${DAYS[dt.getDay()]})</div>${rows}</div>`;
    }).join('') + '</div>';
  }
}

// ── Utils ──
function setMode(mode) {
  selectedMode = mode;
  document.getElementById('modeSlot').classList.toggle('active', mode==='slot');
  document.getElementById('modeDate').classList.toggle('active', mode==='date');
}
function toggleCreateForm(show) {
  document.getElementById('createForm').style.display    = show ? 'block' : 'none';
  document.getElementById('newMeetingBtn').style.display = show ? 'none'  : 'block';
  if (show) { setMode('date'); document.getElementById('mtitle').focus(); }
}
function heatClass(cnt, total) {
  if (!cnt) return '';
  if (total > 0 && cnt === total) return 's3';
  if (total > 0 && cnt / total >= .5) return 's2';
  return 's1';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pad(n) { return String(n).padStart(2,'0'); }
function fmt(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function changeMonth(d) { vm+=d; if(vm>11){vm=0;vy++;}if(vm<0){vm=11;vy--;} renderCal(); }
function copyShareLink() {
  const url = location.href.split('#')[0] + '#m/' + meetingId;
  navigator.clipboard?.writeText(url)
    .then(() => toast('링크 복사 완료!'))
    .catch(() => { const t=Object.assign(document.createElement('textarea'),{value:url}); t.style.cssText='position:fixed;opacity:0'; document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); toast('링크 복사 완료!'); });
}
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── Events ──
document.getElementById('createBtn').addEventListener('click', createMeeting);
document.getElementById('shareBtn').addEventListener('click', copyShareLink);
document.getElementById('backBtn').addEventListener('click', goHome);
document.getElementById('joinBtn').addEventListener('click', addParticipant);
document.getElementById('prevM').addEventListener('click', ()=>changeMonth(-1));
document.getElementById('nextM').addEventListener('click', ()=>changeMonth(1));
document.getElementById('mtitle').addEventListener('keydown', e=>{ if(e.key==='Enter') createMeeting(); });
document.getElementById('joinName').addEventListener('keydown', e=>{ if(e.key==='Enter') addParticipant(); });

// ── Init ──
sb.auth.onAuthStateChange((_event, session) => {
  currentUser = session?.user || null;
  updateAuthBar(currentUser);
  if (document.getElementById('sHome').classList.contains('on')) renderMeetingList();
});

(async function() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  updateAuthBar(currentUser);
  const hash = location.hash.slice(1);
  if (hash.startsWith('m/')) await goMeeting(hash.slice(2));
  else goHome();
})();
</script>
